<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PierBlox | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; --bg: #050505; --card: #111; --blue: #0095ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        .logo { font-size: 2.5rem; font-weight: 900; }
        .red-text { color: var(--red); text-shadow: 0 0 15px rgba(255,0,0,0.6); }
        section { display: none; }
        #home:target, #afiliado:target, #compras:target { display: block; }
        section:not(:target) { display: none; }
        #home { display: block; }
        #home:target ~ #home { display: block; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .btn-main { display: block; text-align: center; text-decoration: none; background: var(--red); color: white; padding: 18px; border-radius: 15px; font-weight: 900; }
        .nav-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 10px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 5px; }
        .nav-link { padding: 15px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #666; font-weight: 600; }
        .nav-link.active { background: var(--blue); color: white; }
        .nav-link i { margin-right: 15px; width: 20px; text-align: center; }
        .stat-box { background: #000; border: 1px solid #222; padding: 20px; border-radius: 15px; margin-top: 15px; }
        .stat-value { color: var(--blue); font-size: 1.8rem; font-weight: 900; }
    </style>
</head>
<body>
    <header class="container">
        <h1 class="logo">Pier<span class="red-text">Blox</span></h1>
    </header>
    <main class="container">
        <section id="home">
            <div class="card" style="text-align: center;">
                <h2 style="margin-bottom: 10px;">A melhor loja virtual!</h2>
                <a href="#afiliado" class="btn-main">ENTRAR NO PAINEL</a>
            </div>
        </section>
        <section id="afiliado">
            <div class="nav-card">
                <a href="#compras" class="nav-link"><i class="fas fa-shopping-bag"></i> Minhas compras</a>
                <a href="#afiliado" class="nav-link active"><i class="fas fa-users"></i> Área do afiliado</a>
                <a href="#home" class="nav-link"><i class="fas fa-store"></i> Voltar à loja</a>
            </div>
            <div class="card">
                <h2>Seu Painel</h2>
                <div class="stat-box">
                    <p style="font-size: 0.7rem; color: #444;">SALDO</p>
                    <p class="stat-value">R$ 0,00</p>
                </div>
            </div>
        </section>
        <section id="compras">
            <div class="nav-card">
                <a href="#compras" class="nav-link active"><i class="fas fa-shopping-bag"></i> Minhas compras</a>
                <a href="#afiliado" class="nav-link"><i class="fas fa-users"></i> Área do afiliado</a>
                <a href="#home" class="nav-link"><i class="fas fa-store"></i> Voltar à loja</a>
            </div>
            <div style="text-align: center; padding: 50px; color: #444;">Nenhum pedido.</div>
        </section>
    </main>
</body>
</html>
